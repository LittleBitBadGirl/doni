{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="page-section">
  <div class="mx-auto max-w-md px-4 md:px-6">
    <div class="card animate-fade-up shadow-card-hover">
      <div class="text-center mb-6">
        <span class="site-logo-mark inline-flex mb-4 !h-14 !w-14 !text-2xl !text-doni-green-dark !bg-doni-gold/10 !border-doni-gold/30">Д</span>
        <h1 class="font-display text-2xl font-semibold text-doni-green-dark">Вход для правления</h1>
        <p class="mt-2 text-sm text-doni-bark/60">
          Доступ только для администраторов ТСН «ДОНИ».
        </p>
      </div>

      {% if error %}
      <div class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 mb-4" role="alert">
        {{ error }}
      </div>
      {% endif %}

      <form id="admin-login-form" method="post" action="{{ url_for('admin_login_submit') }}" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-doni-bark/70">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="username"
            value="{{ email | default('') }}"
            class="input-field mt-1.5"
          >
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-doni-bark/70">Пароль</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
            class="input-field mt-1.5"
          >
        </div>
        <button type="submit" class="btn-primary w-full mt-2">Войти</button>
      </form>

      <p class="mt-6 text-center text-sm text-doni-bark/50">
        <a href="/" class="text-doni-green hover:text-doni-green-dark transition">← На главную</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
  (function () {
    function getCsrfToken() {
      const match = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
      return match ? decodeURIComponent(match[1]) : null;
    }

    const form = document.getElementById("admin-login-form");
    if (!form) return;

    form.addEventListener("submit", function (event) {
      const token = getCsrfToken();
      if (!token) return;

      event.preventDefault();
      const formData = new FormData(form);

      fetch(form.action, {
        method: "POST",
        body: formData,
        headers: { "X-CSRFToken": token },
        redirect: "follow",
        credentials: "same-origin",
      }).then(function (response) {
        window.location.href = response.url;
      });
    });
  })();
</script>
{% endblock %}
