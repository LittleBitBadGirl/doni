{% extends "base.html" %}

{% block content %}
<section class="page-section">
  <div class="page-container-narrow">
    <h1 class="page-title animate-fade-up">Поиск по сайту</h1>
    <p class="page-lead animate-fade-up stagger-1">Поиск по новостям и документам.</p>

    <div class="card mt-8 mb-6 animate-fade-up stagger-2">
      <label for="search-input" class="block text-sm font-medium text-doni-bark/70 mb-2">
        Введите запрос (минимум 2 символа)
      </label>
      <div class="relative">
        <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 h-4 w-4 text-doni-bark/40 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="search"
               id="search-input"
               name="q"
               value="{{ query }}"
               placeholder="Новости, документы…"
               class="input-field pl-10"
               hx-get="/search/results"
               hx-trigger="keyup changed delay:300ms, search"
               hx-target="#search-results"
               hx-include="this"
               autocomplete="off">
      </div>
    </div>

    <div id="search-results"
         hx-get="/search/results"
         hx-trigger="load"
         hx-include="#search-input">
      <p class="text-sm text-doni-bark/50">Введите запрос для поиска…</p>
    </div>
  </div>
</section>
{% endblock %}
