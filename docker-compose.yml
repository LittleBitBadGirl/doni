services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tsndoni
      POSTGRES_PASSWORD: tsndoni
      POSTGRES_DB: tsndoni
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsndoni -d tsndoni"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tsndoni:tsndoni@postgres:5432/tsndoni
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/var/www/static:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - app

volumes:
  postgres_data:
  uploads_data:
